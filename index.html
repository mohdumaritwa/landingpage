*{
margin:0;
padding:0;

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:#000;

background-image:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.04) 2px,transparent 2px),

align-items:center;

button{

display:flex;

height:85px;

font-size:30px;

font-weight:bold;

cursor:pointer;

box-shadow:0 12px 30px rgba(0,122,255,.45);

button:hover{

transform:scale(1.05);

}

button img{

width:36px;

@keyframes pulse{

box-shadow:0 0 0 0 rgba(0,122,255,.45);
